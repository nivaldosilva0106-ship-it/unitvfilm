<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>UniTvFilm - Sua Plataforma de Streaming</title>
  <meta name="description"
    content="UniTvFilm - Assista aos melhores filmes, séries e canais de TV em uma plataforma moderna e profissional" />
  <meta name="author" content="UniTvFilm" />

  <!-- PWA -->
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="UniTvFilm" />

  <meta property="og:title" content="UniTvFilm - Sua Plataforma de Streaming" />
  <meta property="og:description"
    content="UniTvFilm - Assista aos melhores filmes, séries e canais de TV em uma plataforma moderna e profissional" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/login-bg.jpg" />
  <meta property="og:title" content="UniTvFilm - Filmes, Séries e TV ao Vivo" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="UniTvFilm" />
  <meta name="twitter:description" content="Assista aos melhores filmes, séries e canais de TV." />
  <meta name="twitter:image" content="/login-bg.jpg" />

  <!-- Preload YouTube API for faster player loading -->
  <link rel="preload" href="https://www.youtube.com/iframe_api" as="script" />
</head>

<body>
  <div id="root">
    <style>
      #root-loader {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0a0a0a;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .loader-icon {
        margin-bottom: 1.5rem;
        border-radius: 0.75rem;
        background-color: #059669;
        padding: 1rem;
        box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.2), 0 4px 6px -4px rgba(5, 150, 105, 0.1);
      }
      .loader-title {
        margin-bottom: 0.5rem;
        font-size: 1.875rem;
        font-weight: 700;
        letter-spacing: -0.025em;
      }
      .loader-title span { color: #fff; }
      .loader-title span.highlight { color: #10b981; }
      .loader-text {
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
        letter-spacing: 0.1em;
        color: #9ca3af;
        text-transform: uppercase;
      }
      .loader-spinner {
        position: relative;
        height: 2.5rem;
        width: 2.5rem;
      }
      .loader-spinner::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: #10b981;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <div id="root-loader">
      <div class="loader-icon">
        <img src="/favicon.png" alt="UniTvFilm" width="48" height="48" style="border-radius: 8px; display: block;" />
      </div>
      <h1 class="loader-title">
        <span>Uni</span><span class="highlight">Tv</span><span>Film</span>
      </h1>
      <p class="loader-text">CARREGANDO</p>
      <div class="loader-spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
